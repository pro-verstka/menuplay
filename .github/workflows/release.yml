name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app bundle
        run: ./scripts/build.sh

      - name: Read app version
        run: |
          APP_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' build/MenuPlay.app/Contents/Info.plist)
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Validate tag matches app version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${APP_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag version ${TAG_VERSION} does not match app version ${APP_VERSION}."
            exit 1
          fi

      - name: Package release assets
        run: ./scripts/package-release.sh build/MenuPlay.app dist

      - name: Write release notes
        run: ./scripts/generate-release-notes.sh release-notes.md

      - name: Publish tag release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" -y || true
          gh release create "${GITHUB_REF_NAME}" \
            dist/MenuPlay-macos.zip \
            dist/MenuPlay-macos.dmg \
            --target "${GITHUB_SHA}" \
            --verify-tag \
            --title "MenuPlay ${APP_VERSION}" \
            --notes-file release-notes.md
