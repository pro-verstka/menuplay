name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rolling-main-release
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app bundle
        run: ./scripts/build.sh

      - name: Package release assets
        run: ./scripts/package-release.sh build/MenuPlay.app dist

      - name: Write release notes
        run: ./scripts/generate-release-notes.sh release-notes.md

      - name: Replace rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete rolling-main --cleanup-tag -y || true
          git push origin :refs/tags/rolling-main || true
          gh release create rolling-main \
            dist/MenuPlay-macos.zip \
            dist/MenuPlay-macos.dmg \
            --target "${GITHUB_SHA}" \
            --title "Main branch build" \
            --notes-file release-notes.md
